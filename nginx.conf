events {
    worker_connections 1024;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    upstream api_backend {
        server api1:8080;
        server api2:8080;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}