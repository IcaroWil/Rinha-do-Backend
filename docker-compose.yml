services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "16MB"

  api1:
    image: wilcaro572/rinha-fraud-rust:v2
    container_name: rinha-api1
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "167MB"

  api2:
    image: wilcaro572/rinha-fraud-rust:v2
    container_name: rinha-api2
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "167MB"